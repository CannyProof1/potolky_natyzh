{% extends "base.html" %}

{% block title %}Вход - Натяжные потолки{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="bi bi-box-arrow-in-right"></i> Вход в систему</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label">Имя пользователя</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="username" name="username" required autofocus>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">Пароль</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-box-arrow-in-right"></i> Войти
                        </button>
                    </div>
                </form>
                
                <hr>
                
                <div class="text-center">
                    <p class="mb-0">Еще нет аккаунта? <a href="{{ url_for('register') }}">Зарегистрироваться</a></p>
                </div>
                
                <div class="mt-3">
                    <div class="alert alert-info small">
                        <strong>Тестовые аккаунты:</strong><br>
                        <strong>Админ:</strong> admin / admin123<br>
                        <strong>Продавец:</strong> seller / seller123<br>
                        <strong>Покупатель:</strong> customer / customer123
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
