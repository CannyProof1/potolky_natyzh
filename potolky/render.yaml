services:
  - type: web
    name: ceiling-site
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ceiling_db
          property: connectionString

databases:
  - name: ceiling_db
    plan: free